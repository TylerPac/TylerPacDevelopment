server {
  listen 80;
  server_name tylerpac.dev www.tylerpac.dev;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  location = /index.html {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|eot|pdf)$ {
    expires 365d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # No backend; this is a static site. Remove /api proxying.

  location / {
    try_files $uri /index.html;
  }

  error_page 404 /index.html;
}
